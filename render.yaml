services:
  - type: web
    name: object-tracking-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_DEBUG
        value: "false"
      - key: JPEG_QUALITY
        value: "75"
      - key: FRAME_WIDTH
        value: "640"
      - key: FRAME_HEIGHT
        value: "480"
      - key: CONF_THRESH
        value: "0.40"
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
